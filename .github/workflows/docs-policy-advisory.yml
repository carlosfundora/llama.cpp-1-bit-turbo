name: docs-policy-advisory

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'README*'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-policy-advisory.yml'
      - 'src/**'
      - 'common/**'
      - 'ggml/**'
      - 'examples/**'
      - 'tools/**'
      - 'scripts/**'
      - 'gguf-py/**'
      - 'CMakeLists.txt'
      - 'cmake/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: docs-policy-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docs-policy:
    name: Documentation Policy Advisory
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Evaluate documentation policy advisory
        shell: python
        run: |
          import os, subprocess
          from pathlib import Path
          marker='<!-- docs-policy-comment -->'
          base='${{ github.event.pull_request.base.ref }}'
          subprocess.run(['git','fetch','--no-tags','--depth=1','origin',base], check=True)
          diff=subprocess.check_output(['git','diff','--name-status','--find-renames',f'origin/{base}...HEAD'], text=True)
          def is_doc(p):
              n=os.path.basename(p)
              return p=='CHANGELOG.md' or p.startswith('docs/') or p.endswith('.md') or n.startswith('README')
          def is_codeish(p):
              return p not in {'LICENSE','LICENSE.md','LICENSE.txt','.gitignore','.gitattributes'} and not p.startswith('.github/') and not is_doc(p)
          changes=[]
          for raw in diff.splitlines():
              parts=raw.split('\t')
              if not parts: continue
              if parts[0].startswith('R') and len(parts)>=3: changes.append(parts[2])
              elif len(parts)>=2: changes.append(parts[1])
          docs=sorted({p for p in changes if is_doc(p) and p!='CHANGELOG.md'})
          code=sorted({p for p in changes if is_codeish(p)})
          failures=[]
          if code:
              if 'CHANGELOG.md' not in changes: failures.append('`CHANGELOG.md` was not updated in this PR.')
              if not docs: failures.append('Code or configuration files changed, but no documentation files were updated.')
          lines=[marker,'## Documentation policy advisory','']
          if failures:
              lines += ['⚠️ Documentation or changelog updates appear to be missing.','','This is advisory and does not block CI.','','### Requested updates'] + [f'- {f}' for f in failures]
          else:
              lines.append('✅ Documentation policy looks good.')
          lines += ['', '### Changed documentation files'] + ([f'- `{p}`' for p in docs] if docs else ['- None'])
          lines += ['', '### Changed code/config files'] + ([f'- `{p}`' for p in code] if code else ['- None'])
          Path('docs-policy-report.md').write_text('\n'.join(lines)+'\n')
          Path('docs-policy-status.txt').write_text('fail\n' if failures else 'pass\n')
      - name: Create or update documentation policy comment
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs=require('fs'); const body=fs.readFileSync('docs-policy-report.md','utf8'); const status=fs.readFileSync('docs-policy-status.txt','utf8').trim(); const marker='<!-- docs-policy-comment -->'; const issue_number=context.payload.pull_request.number;
            const comments=await github.paginate(github.rest.issues.listComments,{owner:context.repo.owner,repo:context.repo.repo,issue_number,per_page:100});
            const existing=comments.find(c=>c.body&&c.body.includes(marker));
            if(status==='fail'){ if(existing) await github.rest.issues.updateComment({owner:context.repo.owner,repo:context.repo.repo,comment_id:existing.id,body}); else await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number,body}); }
            else if(existing) await github.rest.issues.deleteComment({owner:context.repo.owner,repo:context.repo.repo,comment_id:existing.id});
      - name: Report documentation policy result
        run: |
          echo "Documentation policy status: $(cat docs-policy-status.txt 2>/dev/null || echo unavailable)"
          cat docs-policy-report.md 2>/dev/null || true
