name: amd-local-ci

on:
  pull_request:
    paths:
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'src/**'
      - 'common/**'
      - 'ggml/**'
      - 'examples/**'
      - 'tests/**'
      - 'tools/**'
      - 'scripts/**'
      - 'gguf-py/**'
      - '.github/workflows/amd-local-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: amd-local-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      python: ${{ steps.filter.outputs.python }}
      rocm: ${{ steps.filter.outputs.rocm }}
      vulkan: ${{ steps.filter.outputs.vulkan }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        name: Compute path groups locally
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          else
            changed="$(git diff --name-only HEAD~1...HEAD || true)"
          fi
          cpp=false; python=false; rocm=false; vulkan=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              CMakeLists.txt|cmake/*|cmake/**|src/*|src/**|common/*|common/**|ggml/*|ggml/**|examples/*|examples/**|tests/*|tests/**|tools/*|tools/**) cpp=true ;;
              scripts/*.py|scripts/**/*.py|gguf-py/*|gguf-py/**|requirements*.txt|pyproject.toml) python=true ;;
              *hip*|*HIP*|*rocm*|*ROCm*|*ROCM*|ggml/src/ggml-hip/*|ggml/src/ggml-hip/**|ggml/src/ggml-rocm/*|ggml/src/ggml-rocm/**) rocm=true ;;
              *vulkan*|*Vulkan*|ggml/src/ggml-vulkan/*|ggml/src/ggml-vulkan/**) vulkan=true ;;
            esac
          done <<< "$changed"
          printf '%s\n' "$changed"
          echo "cpp=$cpp" >> "$GITHUB_OUTPUT"
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "rocm=$rocm" >> "$GITHUB_OUTPUT"
          echo "vulkan=$vulkan" >> "$GITHUB_OUTPUT"

  amd-cpu-smoke:
    name: AMD CPU C++ smoke
    needs: detect
    if: github.event_name == 'workflow_dispatch' || needs.detect.outputs.cpp == 'true'
    runs-on: [self-hosted, linux, x64, amd]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Configure CPU build
        run: cmake -S . -B build-cpu -DCMAKE_BUILD_TYPE=Release -DLLAMA_BUILD_TESTS=ON
      - name: Build CPU smoke targets
        run: cmake --build build-cpu --config Release -j"$(nproc)"
      - name: Run focused tests
        run: ctest --test-dir build-cpu --output-on-failure -R 'test-tokenizer|test-quantize|test-grammar|test-chat' || true

  rocm-hip-smoke:
    name: ROCm/HIP smoke
    needs: detect
    if: github.event_name == 'workflow_dispatch' || needs.detect.outputs.rocm == 'true'
    runs-on: [self-hosted, linux, x64, amd, rocm, hip, gfx1030]
    timeout-minutes: 60
    env:
      HSA_OVERRIDE_GFX_VERSION: '10.3.0'
      AMDGPU_TARGETS: gfx1030
      PYTORCH_ROCM_ARCH: gfx1030
      ROCM_PATH: /opt/rocm
      HIP_PATH: /opt/rocm
    steps:
      - uses: actions/checkout@v5
      - name: Show ROCm environment
        run: |
          rocminfo | head -n 80 || true
          hipconfig || true
      - name: Configure HIP build
        run: cmake -S . -B build-hip -DCMAKE_BUILD_TYPE=Release -DGGML_HIP=ON -DAMDGPU_TARGETS=gfx1030
      - name: Build HIP smoke targets
        run: cmake --build build-hip --config Release -j"$(nproc)"

  vulkan-smoke:
    name: Vulkan smoke
    needs: detect
    if: github.event_name == 'workflow_dispatch' || needs.detect.outputs.vulkan == 'true'
    runs-on: [self-hosted, linux, x64, amd, vulkan]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Configure Vulkan build
        run: cmake -S . -B build-vulkan -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON
      - name: Build Vulkan smoke targets
        run: cmake --build build-vulkan --config Release -j"$(nproc)"

  python-tooling:
    name: Python tooling smoke
    needs: detect
    if: github.event_name == 'workflow_dispatch' || needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python compile smoke
        run: python -m compileall scripts gguf-py
